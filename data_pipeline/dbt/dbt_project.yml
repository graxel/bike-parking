name: 'citibike_dbt'
version: '1.0.0'
config-version: 2
profile: 'citibike_dbt'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

on-run-start:
  - "SET statement_timeout = 30000;"

models:
  citibike_dbt:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    consumption:
      +materialized: table
      +schema: consumption
