name: 'citibike_dbt'
version: '1.0.0'
config-version: 2
profile: 'citibike_dbt'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

on-run-start:
  - "SET statement_timeout = 30000;"
  - "CREATE INDEX IF NOT EXISTS idx_int_status_lookup ON intermediate.int_station_status (station_id, reported_at);"
  - "CREATE INDEX IF NOT EXISTS idx_con_current_lookup ON consumption.con_station_status_current (station_id);"
  - "CREATE INDEX IF NOT EXISTS idx_con_history_lookup ON consumption.con_station_availability_history (station_id, reported_hour);"

models:
  citibike_dbt:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    consumption:
      +materialized: table
      +schema: consumption
