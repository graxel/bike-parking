name: Deploy to home servers

on:
  push:
    branches:
      - main
      - test

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: >-
      ${{ github.ref_name == 'main' && 'prod' ||
          github.ref_name == 'test' && 'qa'   ||
          'default' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to ${{ github.ref_name }}
        uses: appleboy/ssh-action@v1.0.3
        env:
          GIT_REPO: ${{ github.repository }}
          REPO_NAME: ${{ github.event.repository.name }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        with:
          host: ${{ secrets.SERVER_IP_ADDR }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GIT_REPO,REPO_NAME,GITHUB_REF_NAME,DB_NAME,DB_HOST,DB_PORT,DB_USER,DB_PASSWORD
          script: |
            cd ~/"$REPO_NAME" || \
            git clone "https://github.com/$GIT_REPO" ~/"$REPO_NAME" && \
            cd ~/"$REPO_NAME" && \
            git checkout "$GITHUB_REF_NAME" && \
            git pull origin "$GITHUB_REF_NAME" && \
            bash setup_scripts/deploy.sh
