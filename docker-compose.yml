services:

  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    command: ["fastapi", "run", "app/main.py", "--port", "8000", "--host", "0.0.0.0"]

  airflow-init:
    build: .
    env_file: .env
    command: 
      - "/bin/bash"
      - "-c"
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --firstname admin \
          --lastname admin \
          --role Admin \
          --email admin@example.com \
          --password admin || true
        # Ensure log templates are seeded via robust script
        python3 data_pipeline/init_airflow_db.py

  airflow-webserver:
    build: .
    ports:
      - "8080:8080"
    env_file: .env
    # Wait for the database schema to be ready
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: ["airflow", "webserver"]

  airflow-scheduler:
    build: .
    env_file: .env
    # Wait for the database schema to be ready
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: ["airflow", "scheduler"]
