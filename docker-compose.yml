services:

  api:
    build: .
    env_file: .env
    ports:
      - "${HISTORY_PORT}:${HISTORY_PORT}"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: ["fastapi", "run", "app/main.py", "--port", "${HISTORY_PORT}", "--host", "0.0.0.0"]

  airflow-init:
    build: .
    env_file: .env
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}?options=-csearch_path%3Dairflow,public
      - MLFLOW_BACKEND_STORE_URI=postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}?options=-csearch_path%3Dmlflow
      - AIRFLOW__DATABASE__SQL_ALCHEMY_POOL_SIZE=5
      - AIRFLOW__DATABASE__SQL_ALCHEMY_MAX_OVERFLOW=5
      - AIRFLOW__WEBSERVER__WORKERS=2
    volumes:
      - ./airflow/logs:/bike-parking/airflow/logs
    command: 
      - "/bin/bash"
      - "-c"
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --firstname admin \
          --lastname admin \
          --role Admin \
          --email admin@example.com \
          --password admin || true
        # Ensure log templates are seeded via robust script
        python3 data_pipeline/init_airflow_db.py

  airflow-webserver:
    build: .
    env_file: .env
    ports:
      - "${AIRFLOW_WEBSERVER_PORT}:${AIRFLOW_WEBSERVER_PORT}"
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}?options=-csearch_path%3Dairflow,public
      - MLFLOW_BACKEND_STORE_URI=postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}?options=-csearch_path%3Dmlflow
      - AIRFLOW__WEBSERVER__ENABLE_PROXY_FIX=True
      - AIRFLOW__DATABASE__SQL_ALCHEMY_POOL_SIZE=5
      - AIRFLOW__DATABASE__SQL_ALCHEMY_MAX_OVERFLOW=5
      - AIRFLOW__WEBSERVER__WORKERS=2
    volumes:
      - ./airflow/logs:/bike-parking/airflow/logs
    # Wait for the database schema to be ready
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      api:
        condition: service_started
    command: ["airflow", "webserver", "--port", "${AIRFLOW_WEBSERVER_PORT}"]

  airflow-scheduler:
    build: .
    hostname: airflow-scheduler
    env_file: .env
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}?options=-csearch_path%3Dairflow,public
      - MLFLOW_BACKEND_STORE_URI=postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}?options=-csearch_path%3Dmlflow
      - AIRFLOW__DATABASE__SQL_ALCHEMY_POOL_SIZE=5
      - AIRFLOW__DATABASE__SQL_ALCHEMY_MAX_OVERFLOW=5
    volumes:
      - ./airflow/logs:/bike-parking/airflow/logs
    # Wait for the database schema to be ready
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      api:
        condition: service_started
    command: ["airflow", "scheduler"]
